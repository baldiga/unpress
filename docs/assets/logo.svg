<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4603A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8502F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5F0EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8ddd3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background pill -->
  <rect x="0" y="0" width="520" height="120" rx="24" fill="url(#bg)"/>
  <!-- WP arrow icon -->
  <g transform="translate(30, 25)">
    <circle cx="35" cy="35" r="32" fill="none" stroke="#F5F0EB" stroke-width="3" opacity="0.4"/>
    <text x="35" y="47" text-anchor="middle" fill="#F5F0EB" font-family="Arial, sans-serif" font-size="36" font-weight="bold" opacity="0.5">W</text>
  </g>
  <!-- Arrow -->
  <g transform="translate(105, 40)">
    <line x1="0" y1="20" x2="40" y2="20" stroke="#F5F0EB" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <polyline points="30,10 42,20 30,30" fill="none" stroke="#F5F0EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>
  <!-- Modern stack icon -->
  <g transform="translate(155, 25)">
    <rect x="8" y="8" width="22" height="22" rx="4" fill="none" stroke="#F5F0EB" stroke-width="2.5" opacity="0.4"/>
    <rect x="35" y="8" width="22" height="22" rx="4" fill="none" stroke="#F5F0EB" stroke-width="2.5" opacity="0.4"/>
    <rect x="22" y="35" width="22" height="22" rx="4" fill="none" stroke="#F5F0EB" stroke-width="2.5" opacity="0.4"/>
  </g>
  <!-- Text -->
  <text x="230" y="78" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="-2">
    <tspan fill="#FFFFFF">Un</tspan><tspan fill="url(#accent)">press</tspan>
  </text>
</svg>
